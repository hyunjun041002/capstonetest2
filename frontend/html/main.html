<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot Main</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/frontend/css/style.css">
</head>
<body>

  <div class="app-container">
    
    <aside class="sidebar">
      <div class="sidebar-top">
        <button class="sidebar-btn active">
          <i class="fa-regular fa-pen-to-square"></i>
          <span>새 채팅</span>
        </button>
        <button class="sidebar-btn">
          <i class="fa-solid fa-magnifying-glass"></i>
          <span>채팅 검색</span>
        </button>
        <button class="sidebar-btn">
          <i class="fa-regular fa-image"></i>
          <span>이미지</span>
        </button>
        <button class="sidebar-btn">
          <i class="fa-solid fa-border-all"></i>
          <span>앱</span>
        </button>
      </div>

      <div class="sidebar-bottom">
        <button class="sidebar-btn">
          <i class="fa-solid fa-gear"></i>
          <span>설정</span>
        </button>
        <button class="sidebar-btn">
          <i class="fa-solid fa-compass"></i>
          <span>도움말</span>
        </button>
      </div>
    </aside>

    <div class="main-area" style="display: flex; align-items: center; justify-content: center; background: #ffffff;">
      <div style="text-align: center; color: #6b7280;">
        <h2 style="font-size: 24px; color: #1f2937; margin-bottom: 8px;">무엇을 도와드릴까요?</h2>
        <p>챗봇이 대화할 준비가 되었습니다.</p>
      </div>
    </div>

  </div>

</body>
