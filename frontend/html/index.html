<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatGPT Clone</title>
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body>
    <!-- 사이드바 -->
    <aside class="sidebar">
      <div>
        <button id="new-chat-btn" class="new-chat-btn">
          <span>✨ New Chat</span>
          <span>+</span>
        </button>

        <div class="history">
          <p class="history-title">최근 대화</p>

          <button class="history-item">💬 순수 자바스크립트 공부하기</button>
        </div>
      </div>

      <div class="sidebar-footer">
        <button class="logout-btn">로그아웃</button>
      </div>
    </aside>

    <!-- 메인 -->
    <main class="main">
      <!-- 헤더 -->
      <header class="header">
        <h1>ChatGPT <span>4o</span></h1>
      </header>

      <!-- 채팅 영역 -->
      <div id="chat-feed" class="chat-feed">
        <div class="message">
          <div class="avatar">AI</div>

          <div class="message-content">
            안녕하세요! 순수 자바스크립트로 만든 GPT 대화창입니다. 무엇을
            도와드릴까요?
          </div>
        </div>
      </div>

      <!-- 입력창 -->
      <div class="input-area">
        <form id="chat-form">
          <div class="input-wrapper">
            <input
              type="text"
              id="chat-input"
              placeholder="ChatGPT에게 메시지 보내기"
            />

            <button type="submit" id="send-btn">➤</button>
          </div>
        </form>
      </div>
    </main>
    <script type="module" src="js/index.js"></script>
  </body>
</html>
